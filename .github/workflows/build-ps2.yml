name: PS2 Homebrew - Build java.elf

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git make gcc g++ patch wget unzip build-essential autoconf automake libtool \
            bison flex texinfo gawk gettext zlib1g-dev \
            libgmp-dev libmpfr-dev libmpc-dev libisl-dev

      - name: Instalar PS2 toolchain (sem GDB)
        run: |
          git clone --depth 1 https://github.com/ps2dev/ps2toolchain.git
          cd ps2toolchain
          sed -i 's/build_gdb="yes"/build_gdb="no"/' toolchain.sh || true
          sed -i '/gdb/d' toolchain.sh scripts/* || true
          ./toolchain.sh
          cd ..
          mkdir -p $HOME/ps2dev
          export PS2DEV=$HOME/ps2dev
          echo "PS2DEV=$HOME/ps2dev" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/ps2dev/bin" >> $GITHUB_ENV

      - name: Instalar PS2SDK
        run: |
          git clone --depth 1 https://github.com/ps2dev/ps2sdk.git
          cd ps2sdk
          make -j$(nproc)
          make install
          echo "PS2SDK=$HOME/ps2dev/ps2sdk" >> $GITHUB_ENV

      - name: Limpar projeto
        run: make clean || true

      - name: Compilar java.elf
        run: make

      - name: Verificar ELF gerado
        run: |
          ls -la java.elf || echo "ELF não encontrado!"
          file java.elf

      - name: Upload java.elf
        uses: actions/upload-artifact@v4
        with:
          name: java-elf-ps2
          path: java.elf
          if-no-files-found: error
